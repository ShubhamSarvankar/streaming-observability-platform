networks:
  obsnet:
    driver: bridge

volumes:
  cassandra-data:
  spark-checkpoints:
  spark-ivy2:
  ollama-data:

services:

  # ── Kafka (KRaft, no ZooKeeper) ──────────────────────────────────────────
  kafka:
    image: apache/kafka:3.7.1
    container_name: kafka
    networks: [obsnet]
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@localhost:9093"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: "${KAFKA_PARTITIONS:-3}"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"
      KAFKA_CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qg"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ── Cassandra ─────────────────────────────────────────────────────────────
  cassandra:
    image: cassandra:4.1.6
    container_name: cassandra
    networks: [obsnet]
    environment:
      MAX_HEAP_SIZE: "512M"
      HEAP_NEWSIZE: "100M"
    volumes:
      - cassandra-data:/var/lib/cassandra
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'describe keyspaces'"]
      interval: 15s
      timeout: 15s
      retries: 12
      start_period: 90s

  # ── Cassandra schema init (runs once after cassandra is healthy) ───────────
  cassandra-init:
    image: cassandra:4.1.6
    networks: [obsnet]
    depends_on:
      cassandra:
        condition: service_healthy
    volumes:
      - ./cassandra/schema.cql:/schema.cql:ro
    command: cqlsh cassandra -f /schema.cql
    restart: "no"

  # ── Log replay producer ───────────────────────────────────────────────────
  producer:
    build: ./producer
    container_name: producer
    networks: [obsnet]
    depends_on:
      kafka:
        condition: service_healthy
      cassandra-init:
        condition: service_completed_successfully
    volumes:
      - ./data:/data:ro
    environment:
      KAFKA_BOOTSTRAP: "${KAFKA_BOOTSTRAP:-kafka:9092}"
      KAFKA_TOPIC: "${KAFKA_TOPIC:-access-logs}"
      DATASET_PATH: "${DATASET_PATH:-/data/access_log}"
      REPLAY_RATE_PER_SEC: "${REPLAY_RATE_PER_SEC:-200}"
    restart: on-failure

  # ── Spark Structured Streaming ────────────────────────────────────────────
  spark-streaming:
    build: ./spark
    container_name: spark-streaming
    networks: [obsnet]
    depends_on:
      kafka:
        condition: service_healthy
      cassandra-init:
        condition: service_completed_successfully
    volumes:
      - spark-checkpoints:/checkpoints
      - spark-ivy2:/root/.ivy2
    environment:
      KAFKA_BOOTSTRAP: "${KAFKA_BOOTSTRAP:-kafka:9092}"
      KAFKA_TOPIC: "${KAFKA_TOPIC:-access-logs}"
      CASSANDRA_CONTACT_POINTS: "${CASSANDRA_CONTACT_POINTS:-cassandra}"
      CASSANDRA_PORT: "${CASSANDRA_PORT:-9042}"
      CASSANDRA_KEYSPACE: "${CASSANDRA_KEYSPACE:-obs}"
      WINDOW_MINUTES: "${WINDOW_MINUTES:-10}"
      WATERMARK_MINUTES: "${WATERMARK_MINUTES:-5}"
      CHECKPOINT_DIR: "${CHECKPOINT_DIR:-/checkpoints}"
      ANOMALY_IP_FLOOR: "${ANOMALY_IP_FLOOR:-500}"
      ANOMALY_STATUS_FLOOR: "${ANOMALY_STATUS_FLOOR:-200}"
    restart: on-failure

  # ── Anomaly injector (on-demand, profile: tools) ──────────────────────────
  anomaly-injector:
    build: ./producer
    container_name: anomaly-injector
    networks: [obsnet]
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP: "${KAFKA_BOOTSTRAP:-kafka:9092}"
      KAFKA_TOPIC: "${KAFKA_TOPIC:-access-logs}"
    command: python anomaly_injector.py
    profiles: [tools]

  # ── Spring Boot API (added in Phase 2) ────────────────────────────────────
  springboot-api:
    build: ./api
    container_name: springboot-api
    networks: [obsnet]
    ports:
      - "${API_PORT:-8080}:8080"
    depends_on:
      cassandra:
        condition: service_healthy
      cassandra-init:
        condition: service_completed_successfully
    environment:
      CASSANDRA_CONTACT_POINTS: "${CASSANDRA_CONTACT_POINTS:-cassandra}"
      CASSANDRA_PORT: "${CASSANDRA_PORT:-9042}"
      CASSANDRA_LOCAL_DC: "${CASSANDRA_LOCAL_DC:-datacenter1}"
      CASSANDRA_KEYSPACE: "${CASSANDRA_KEYSPACE:-obs}"
      API_PORT: "${API_PORT:-8080}"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/api/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 60s
    profiles: [api]

  # ── Ollama (local LLM server with GPU, profile: ollama) ──────────────────
  ollama:
    image: ollama/ollama@sha256:a6149234667efc71d37766d61c1a16f24c33e4cd7a0bf4125c44a7e47e2419c4
    container_name: ollama
    networks: [obsnet]
    volumes:
      - ollama-data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: ["gpu"]
    profiles: [ollama]

  # ── LangGraph agent (interactive, on-demand, profile: agent) ──────────────
  # Run with: docker compose --profile api --profile agent run --rm agent
  # (springboot-api must be healthy before the agent is useful)
  agent:
    build: ./agent
    container_name: agent
    networks: [obsnet]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      API_BASE_URL: "${API_BASE_URL:-http://springboot-api:8080}"
      LLM_PROVIDER: "${LLM_PROVIDER:-anthropic}"
      LLM_MODEL: "${LLM_MODEL:-claude-haiku-4-5}"
      LLM_API_KEY: "${LLM_API_KEY}"
      OLLAMA_HOST: "${OLLAMA_HOST:-http://ollama:11434}"
    stdin_open: true
    tty: true
    profiles: [agent]
